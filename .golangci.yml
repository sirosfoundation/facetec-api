# golangci-lint v2 configuration for facetec-api
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  tests: false

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/sirosfoundation/facetec-api

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - misspell
    - unconvert
  disable:
    - exhaustive
    - unparam
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
  exclusions:
    rules:
      # HTTP response body close in defer - best effort
      - linters:
          - errcheck
        text: "resp\\.Body\\.Close"
      # zap logger sync on exit - best effort
      - linters:
          - errcheck
        text: "log\\.Sync"
