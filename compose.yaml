services:
  facetec-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - "./configs/config.yaml:/app/configs/config.yaml:ro"
      - "./rules:/app/rules:ro"
    environment:
      # Override individual settings without editing the config file.
      # FACETEC_SERVER_URL: "https://your-facetec-server.example.org"
      # FACETEC_DEVICE_KEY_PATH: "/run/secrets/facetec_device_key"
      # ISSUER_ADDR: "vc-issuer:8090"
      LOG_LEVEL: "info"
    # Liveness / readiness probes (native Docker healthcheck).
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/livez || exit 1"]
      interval: 15s
      timeout: 3s
      start_period: 5s
      retries: 3

  # Optional: local mock of the FaceTec Server for development.
  # Uncomment to use the mock instead of a real FaceTec Server.
  # facetec-mock:
  #   image: golang:1.25-alpine
  #   command: go run ./tests/integration/mockfacetec/server_main.go
  #   ports:
  #     - "9090:9090"
  #   profiles:
  #     - dev
