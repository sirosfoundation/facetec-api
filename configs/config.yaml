## facetec-api development configuration
## All values shown are the defaults; omit a key to use the default.
## Environment variables (e.g. FACETEC_SERVER_URL) override file values.

# ── HTTP server ───────────────────────────────────────────────────────────────
server:
  host: "0.0.0.0"
  port: 8080

  # Maximum number of biometric requests (process-request, liveness, id-scan,
  # session-token) processed concurrently. Each request amplifies payload size
  # ~3-4× in memory; this cap prevents OOM under sustained concurrency.
  # Set to 0 to disable the limit.
  max_concurrent_biometric: 10

  # Externally reachable base URL; used when constructing credential offer URIs.
  # If empty, the service falls back to the bind address (development only).
  # public_base_url: "https://facetec-api.example.org"

  # TLS — disable for local development, always enable in production.
  tls:
    enabled: false
    # cert_file: "/etc/facetec-api/tls.crt"
    # key_file:  "/etc/facetec-api/tls.key"

# ── FaceTec Server ────────────────────────────────────────────────────────────
facetec:
  # Base URL of the FaceTec Server REST API (required).
  server_url: "https://facetec-server.example.org"

  # SDK device key — set directly or load from a file (prefer file in production).
  device_key: ""
  # device_key_path: "/run/secrets/facetec_device_key"

  # HTTP timeout for FaceTec Server requests.
  timeout: "30s"

  # TLS configuration for the outbound HTTPS connection to the FaceTec Server.
  tls:
    # skip_verify: false    # Disable cert verification — NEVER use in production.
    # ca_file:     "/etc/facetec-api/facetec-ca.crt"  # Custom CA certificate.
    # cert_file:   "/etc/facetec-api/client.crt"       # Client certificate for mTLS.
    # key_file:    "/etc/facetec-api/client.key"        # Client private key for mTLS.

# ── vc Credential Issuer (gRPC) ───────────────────────────────────────────────
issuer:
  # gRPC address of the vc issuer service (required).
  addr: "localhost:8090"

  # Disable TLS for local development only.
  tls: false
  # ca_file:   "/etc/facetec-api/issuer-ca.crt"
  # cert_file: "/etc/facetec-api/client.crt"
  # key_file:  "/etc/facetec-api/client.key"

  # Credential scope URI — must match a scope configured in the vc issuer.
  scope: "https://credentials.example.org/photo-id"

  # Credential format: sdjwt (default), mdoc, or vc20.
  format: "sdjwt"

# ── SPOCP Policy ──────────────────────────────────────────────────────────────
policy:
  # Directory containing .spoc rule files loaded at startup.
  rules_dir: "./rules"

# ── Session (in-memory only, never persisted) ─────────────────────────────────
session:
  # How long a FaceMap is held between liveness and id-scan steps.
  liveness_ttl: "2m"
  # How long a credential offer is available for wallet redemption.
  offer_ttl: "5m"

# ── Security ──────────────────────────────────────────────────────────────────
security:
  # Legacy single-tenant Bearer token. Use jwt: instead for new deployments.
  # Leave both empty to DISABLE authentication (development only — never in prod).
  # app_key: ""
  # app_key_path: "/run/secrets/app_key"

  # Per-IP rate limiting on biometric endpoints (POST /liveness, /id-scan, /session-token).
  rate_limit:
    enabled: true
    requests_per_minute: 10

# ── JWT Authentication ─────────────────────────────────────────────────────────
# All tenants are authenticated with the same shared HMAC secret.
# The tenant_id claim in the token selects which policy and issuer settings apply.
# Omitting tenant_id (or using an unconfigured value) falls back to the global
# policy and issuer settings — suitable for most single-tenant deployments.
jwt:
  # HMAC secret for HS256/HS384/HS512. Use secret_path in production.
  # secret: ""
  # secret_path: "/run/secrets/jwt_secret"

  # Expected iss claim. Leave empty to skip issuer validation.
  # issuer: "https://auth.siros.org"

  # When true, requests without a valid Bearer JWT are rejected (recommended in prod).
  require_auth: false

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  # Log level: debug, info, warn, error
  level: "info"
  # Set true for JSON structured logging (recommended in production).
  production: false

# ── Tenant overrides (optional) ───────────────────────────────────────────────
# When this block is absent, a single "default" tenant is synthesised from the
# global policy, issuer, and security settings above (backward-compatible mode).
#
# When present, each tenant is identified by the tenant_id claim in the JWT.
# JWTs with no tenant_id claim, or with an unknown value, fall back to the
# "default" tenant — so most deployments can start without any tenants: block
# and add per-tenant overrides incrementally as requirements diverge.
#
# Example — two tenants with different credential scopes and policy strictness:
#
# tenants:
#   - id: acme
#     issuer:
#       scope: "https://credentials.acme.example.org/photo-id"
#       format: sdjwt
#     policy:
#       rules_dir: "/etc/facetec-api/rules/acme"
#
#   - id: gov
#     issuer:
#       scope: "https://credentials.gov.example.org/id-document"
#       format: mdoc
#     policy:
#       rules_dir: "/etc/facetec-api/rules/gov"
